name: .NET UI tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  test:
    name: Run Selenium tests
    runs-on: ubuntu-latest

    env:
      HEADLESS: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Restore dependencies
        run: dotnet restore FakestoreEcommerceTests.sln

      - name: Build
        run: dotnet build FakestoreEcommerceTests.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test FakestoreEcommerceTests.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/TestResults/*.trx
            **/allure-results/**
          if-no-files-found: ignore
